spring:
  application:
    name: batch-explorer
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  datasource:
    url: jdbc:h2:file:./build/testdb;DB_CLOSE_ON_EXIT=FALSE;DB_CLOSE_DELAY=-1
#    url: jdbc:h2:mem:testdb;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password:
  batch:
    jdbc:
      initialize-schema: always # always, never
  h2:
    console:
      enabled: true
  flyway:
    enabled: true
    baseline-on-migrate: true
  quartz:
    job-store-type: jdbc # memory, jdbc
    jdbc:
      initialize-schema: always